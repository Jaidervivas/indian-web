<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Power Bike | Repuestos</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        :root {
            --rojo: #E31D2B;
            --negro: #0a0a0a;
            --gris: #1a1a1a;
            --blanco: #ffffff;
        }

        body {
            background-color: var(--negro);
            color: var(--blanco);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-bottom: 50px;
            overflow-x: hidden;
        }

        /* HEADER OPTIMIZADO */
        header {
            background: black;
            padding: 15px 20px;
            border-bottom: 3px solid var(--rojo);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 20px;
        }

        /* Logo más grande y encuadrado */
        .logo img { 
            height: 70px; /* Aumentado para mayor impacto */
            display: block;
        }

        /* Buscador Central */
        .search-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        .search-container input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 25px; /* Estilo moderno redondeado */
            border: 1px solid #333;
            background: #111;
            color: white;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }
        .search-container input:focus {
            border-color: var(--rojo);
            box-shadow: 0 0 8px rgba(227, 29, 43, 0.3);
        }

        /* Acceso Mayorista */
        .acceso-mayorista { display: flex; gap: 8px; }
        .pin-input { 
            padding: 10px; 
            border-radius: 5px; 
            border: none; 
            width: 80px; 
            text-align: center;
        }
        .btn-rojo {
            background: var(--rojo);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-rojo:hover { background: #b31620; }

        /* BANNER */
        .hero-swiper { width: 100%; height: auto; aspect-ratio: 16 / 6; margin-bottom: 20px; }
        .hero-swiper img { width: 100%; height: 100%; object-fit: cover; }

        /* CATALOGO */
        .categorias-section { padding: 15px; }
        .titulo-seccion { 
            color: var(--rojo); 
            border-left: 5px solid var(--rojo); 
            padding-left: 10px; 
            margin: 20px; 
            text-transform: uppercase;
        }
        .catalogo {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 15px;
        }
        .card { background: var(--gris); border-radius: 12px; padding: 12px; text-align: center; border: 1px solid #222; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 8px; object-fit: cover; }
        .precio { font-size: 1.2rem; color: var(--rojo); font-weight: bold; margin: 8px 0; }

        /* RESPONSIVO MÓVIL */
        @media (max-width: 768px) {
            .header-container {
                grid-template-columns: 1fr auto;
                gap: 10px;
            }
            .logo img { height: 50px; }
            .search-container {
                grid-column: 1 / -1; /* El buscador pasa abajo en móvil */
                order: 3;
            }
            .acceso-mayorista { order: 2; }
        }

        @media (min-width: 992px) {
            .catalogo { grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo">
                <img src="logo.png" alt="Indian Power Bike">
            </div>

            <div class="search-container">
                <input type="text" id="searchInput" placeholder="¿Qué repuesto buscas?" onkeyup="buscarProducto()">
            </div>

            <div class="acceso-mayorista">
                <input type="password" id="pinInput" class="pin-input" placeholder="PIN">
                <button class="btn-rojo" onclick="verificarPIN()">Entrar</button>
            </div>
        </div>
    </header>

    <div class="swiper hero-swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="banner1.png" alt="Promo 1"></div>
            <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1611637576109-b6f76185ec9b?q=80&w=1200" alt="Promo 2"></div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <h3 class="titulo-seccion" id="titulo-catalogo">Catálogo de Repuestos</h3>
    <div class="catalogo" id="lista-productos">
        </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://TU_PROYECTO.supabase.co';
        const SUPABASE_KEY = 'TU_LLAVE_ANON_KEY';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let todosLosProductos = []; // Guardamos la lista completa para buscar rápido
        let esMayorista = false;

        const swiper = new Swiper('.hero-swiper', {
            loop: true,
            autoplay: { delay: 4000 },
            pagination: { el: '.swiper-pagination', clickable: true },
        });

        // Cargar productos inicialmente
        async function cargarProductos() {
            const { data, error } = await _supabase.from('productos').select('*');
            if (data) {
                todosLosProductos = data;
                renderizarHtml(todosLosProductos);
            }
        }

        // Función de Búsqueda
        function buscarProducto() {
            const termino = document.getElementById('searchInput').value.toLowerCase();
            const filtrados = todosLosProductos.filter(p => 
                p.nombre.toLowerCase().includes(termino) || 
                p.categoria.toLowerCase().includes(termino)
            );
            renderizarHtml(filtrados);
            
            // Cambiar título si no hay resultados
            const titulo = document.getElementById('titulo-catalogo');
            titulo.innerText = filtrados.length > 0 ? "Catálogo de Repuestos" : "No se encontraron resultados";
        }

        function renderizarHtml(data) {
            const contenedor = document.getElementById('lista-productos');
            contenedor.innerHTML = '';
            data.forEach(prod => {
                const precio = esMayorista ? prod.precio_mayorista : prod.precio_letal;
                contenedor.innerHTML += `
                    <div class="card">
                        <img src="${prod.imagen_url}" alt="${prod.nombre}">
                        <h4>${prod.nombre}</h4>
                        <p class="precio">$${precio.toLocaleString()}</p>
                        <button class="btn-rojo" style="width:100%;" onclick="agregarAlCarrito('${prod.nombre}', ${precio})">Pedir</button>
                    </div>
                `;
            });
        }

        async function verificarPIN() {
            const pin = document.getElementById('pinInput').value;
            const { data } = await _supabase.from('acceso_mayoristas').select('*').eq('pin', pin);
            if (data && data.length > 0) {
                esMayorista = true;
                alert("Bienvenido Mayorista: " + data[0].nombre_cliente);
                renderizarHtml(todosLosProductos);
            } else { alert("PIN Incorrecto"); }
        }

        function agregarAlCarrito(nombre, precio) {
            const tel = "573000000000"; // Tu WhatsApp
            const msg = `Hola Indian Power Bike! Me interesa: ${nombre} ($${precio.toLocaleString()})`;
            window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`);
        }

        cargarProductos();
    </script>
</body>
</html>
