<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Power Bike | Repuestos</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        :root {
            --rojo: #E31D2B;
            --negro: #0a0a0a;
            --gris: #1a1a1a;
            --blanco: #ffffff;
        }

        body {
            background-color: var(--negro);
            color: var(--blanco);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-bottom: 50px;
            overflow-x: hidden;
        }

        /* HEADER AJUSTADO (NO FIJO) */
        header {
            background: black;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--rojo);
            position: relative;
            gap: 20px;
            flex-wrap: wrap;
        }

        .logo img { 
            height: 90px; 
            transition: 0.3s;
            display: block;
        }

        .search-container {
            flex: 1;
            max-width: 500px;
            display: flex;
            justify-content: center;
        }
        .search-container input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid #333;
            background: #111;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        .acceso-mayorista { 
            display: flex; 
            flex-direction: column; 
            align-items: flex-end; 
            gap: 5px; 
        }
        .label-mayorista {
            font-size: 0.75rem;
            color: var(--rojo);
            font-weight: bold;
            text-transform: uppercase;
        }
        .inputs-mayorista { display: flex; gap: 8px; }
        .pin-input { 
            padding: 10px; 
            border-radius: 5px; 
            border: none; 
            width: 90px; 
        }

        button {
            background: var(--rojo);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* BANNER */
        .hero-swiper { width: 100%; height: auto; aspect-ratio: 16 / 6; margin-bottom: 20px; }
        .hero-swiper img { width: 100%; height: 100%; object-fit: cover; }

        /* SECCIÓN DE FILTROS */
        .categorias-section { padding: 15px; max-width: 1200px; margin: 0 auto; }
        .grid-categorias {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .cat-card {
            background: var(--gris);
            border-radius: 12px;
            padding: 18px 5px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #333;
        }
        .cat-card img { width: 40px; margin-bottom: 10px; filter: invert(1); }
        .cat-card span { display: block; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; }

        /* CATALOGO */
        .catalogo {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 15px;
        }
        .card { 
            background: var(--gris); 
            border-radius: 12px; 
            padding: 15px; 
            text-align: left; 
            border: 1px solid #222; 
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .card .codigo-ref { font-size: 0.7rem; color: var(--rojo); font-weight: bold; }
        .card .descripcion { font-size: 0.8rem; color: #aaa; }
        
        .img-zoom-cont {
            position: relative;
            cursor: zoom-in;
            overflow: hidden;
            border-radius: 8px;
        }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        .precio { font-size: 1.2rem; color: var(--blanco); font-weight: bold; }
        
        .compra-footer { display: flex; gap: 10px; align-items: center; margin-top: auto; }
        .cant-input { width: 50px; padding: 8px; background: #333; color: white; border: none; border-radius: 5px; text-align: center; }

        /* MODAL LUPA */
        .modal-lupa {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }
        .modal-lupa img { max-width: 90%; max-height: 90%; border: 2px solid var(--rojo); border-radius: 10px; }
        .close-lupa { position: absolute; top: 20px; right: 30px; font-size: 40px; color: white; cursor: pointer; }

        @media (min-width: 768px) {
            .logo img { height: 110px; }
            .grid-categorias { grid-template-columns: repeat(8, 1fr); }
            .catalogo { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
        }

        @media (max-width: 600px) {
            header { flex-direction: column; }
            .logo img { height: 80px; }
            .grid-categorias { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><img src="logo.png" alt="Indian Power Bike"></div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Buscar por nombre o referencia..." onkeyup="buscarProducto()">
        </div>
        <div class="acceso-mayorista">
            <span class="label-mayorista">Ingreso Mayoristas</span>
            <div class="inputs-mayorista">
                <input type="password" id="pinInput" class="pin-input" placeholder="PIN">
                <button onclick="verificarPIN()">Entrar</button>
            </div>
        </div>
    </header>

    <div class="swiper hero-swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="banner1.png" alt="Promo 1"></div>
            <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1611637576109-b6f76185ec9b?q=80&w=1200" alt="Promo 2"></div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <section class="categorias-section">
        <div class="grid-categorias">
            <div class="cat-card" onclick="filtrarCategoria('Cascos')"><span>Cascos</span></div>
            <div class="cat-card" onclick="filtrarCategoria('Frenos')"><span>Frenos</span></div>
            <div class="cat-card" onclick="filtrarCategoria('Kit Arrastre')"><span>Kit Arrastre</span></div>
            <div class="cat-card" onclick="filtrarCategoria('Llantas')"><span>Llantas</span></div>
            <div class="cat-card" onclick="filtrarCategoria('Motor')"><span>Motor</span></div>
            <div class="cat-card" onclick="filtrarCategoria('Accesorios')"><span>Accesorios</span></div>
            <div class="cat-card" onclick="filtrarCategoria('Luces')"><span>Luces</span></div>
            <div class="cat-card" onclick="renderizarHtml(productosCache)"><span>Ver Todo</span></div>
        </div>
    </section>

    <div class="catalogo" id="lista-productos"></div>

    <div id="modalLupa" class="modal-lupa" onclick="this.style.display='none'">
        <span class="close-lupa">&times;</span>
        <img id="imgExpandida">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // LISTA MANUAL DE PRODUCTOS (Agrégalos aquí)
        const productosManuales = [
            {
                id: 1,
                nombre: "Casco MT Revenge 2",
                codigo: "CAS-001",
                descripcion: "Certificación ECE de alta seguridad.",
                categoria: "Cascos",
                precio_letal: 350000,
                precio_mayorista: 290000,
                imagen_url: "https://via.placeholder.com/300"
            },
            {
                id: 2,
                nombre: "Pastillas de Freno Brembo",
                codigo: "FRE-005",
                descripcion: "Máxima potencia de frenado.",
                categoria: "Frenos",
                precio_letal: 85000,
                precio_mayorista: 65000,
                imagen_url: "https://via.placeholder.com/300"
            }
        ];

        let esMayorista = false;
        let productosCache = productosManuales; // Usamos la lista manual por ahora

        function cargarProductos() {
            renderizarHtml(productosCache);
        }

        function renderizarHtml(data) {
            const contenedor = document.getElementById('lista-productos');
            contenedor.innerHTML = '';
            data.forEach(prod => {
                const precio = esMayorista ? prod.precio_mayorista : prod.precio_letal;
                contenedor.innerHTML += `
                    <div class="card">
                        <span class="codigo-ref">REF: ${prod.codigo}</span>
                        <div class="img-zoom-cont" onclick="abrirLupa('${prod.imagen_url}')">
                            <img src="${prod.imagen_url}">
                        </div>
                        <h4>${prod.nombre}</h4>
                        <p class="descripcion">${prod.descripcion}</p>
                        <p class="precio">$${precio.toLocaleString()}</p>
                        <div class="compra-footer">
                            <input type="number" value="1" min="1" class="cant-input" id="cant-${prod.id}">
                            <button style="flex:1;" onclick="agregarAlCarrito('${prod.nombre}', ${precio}, '${prod.id}')">🛒 Agregar</button>
                        </div>
                    </div>
                `;
            });
        }

        function abrirLupa(url) {
            document.getElementById('imgExpandida').src = url;
            document.getElementById('modalLupa').style.display = 'flex';
        }

        function filtrarCategoria(cat) {
            const filtrados = productosCache.filter(p => p.categoria === cat);
            renderizarHtml(filtrados);
        }

        function buscarProducto() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtrados = productosCache.filter(p => p.nombre.toLowerCase().includes(query) || p.codigo.toLowerCase().includes(query));
            renderizarHtml(filtrados);
        }

        function verificarPIN() {
            const pin = document.getElementById('pinInput').value;
            if (pin === "1234") { // PIN de prueba manual
                esMayorista = true;
                alert("Modo Mayorista Activado");
                renderizarHtml(productosCache);
            } else { alert("PIN Incorrecto"); }
        }

        function agregarAlCarrito(nombre, precio, id) {
            const cantidad = document.getElementById('cant-' + id).value;
            const total = precio * cantidad;
            const msg = `¡Hola Indian! 👋\n📌 *${nombre}*\n🔢 Cantidad: ${cantidad}\n💵 Total: $${total.toLocaleString()}`;
            window.open(`https://wa.me/573000000000?text=${encodeURIComponent(msg)}`);
        }

        cargarProductos();
    </script>
</body>
</html>
