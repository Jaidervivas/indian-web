<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Power Bike | Repuestos</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        :root {
            --rojo: #E31D2B;
            --negro: #0a0a0a;
            --gris: #1a1a1a;
            --blanco: #ffffff;
        }

        body {
            background-color: var(--negro);
            color: var(--blanco);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-bottom: 50px;
            overflow-x: hidden;
        }

        /* HEADER AJUSTADO (NO FIJO) */
        header {
            background: black;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--rojo);
            position: relative; /* Cambiado de sticky a relative para que suba con el scroll */
            gap: 20px;
            flex-wrap: wrap;
        }

        /* Logo a la izquierda con tamaño destacado */
        .logo img { 
            height: 90px; 
            transition: 0.3s;
            display: block;
        }

        /* Buscador en el centro */
        .search-container {
            flex: 1;
            max-width: 500px;
            display: flex;
            justify-content: center;
        }
        .search-container input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid #333;
            background: #111;
            color: white;
            outline: none;
            font-size: 1rem;
        }
        .search-container input:focus { border-color: var(--rojo); }

        /* Acceso Mayorista a la derecha */
        .acceso-mayorista { 
            display: flex; 
            flex-direction: column; 
            align-items: flex-end; 
            gap: 5px; 
        }
        .label-mayorista {
            font-size: 0.75rem;
            color: var(--rojo);
            font-weight: bold;
            text-transform: uppercase;
        }
        .inputs-mayorista { display: flex; gap: 8px; }
        .pin-input { 
            padding: 10px; 
            border-radius: 5px; 
            border: none; 
            width: 90px; 
            font-size: 0.9rem;
        }

        button {
            background: var(--rojo);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #b31621; }

        /* BANNER */
        .hero-swiper { width: 100%; height: auto; aspect-ratio: 16 / 6; margin-bottom: 20px; }
        .hero-swiper img { width: 100%; height: 100%; object-fit: cover; }

        /* SECCIÓN DE FILTROS */
        .categorias-section { padding: 15px; max-width: 1200px; margin: 0 auto; }
        .grid-categorias {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .cat-card {
            background: var(--gris);
            border-radius: 12px;
            padding: 18px 5px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #333;
            transition: 0.3s;
        }
        .cat-card:hover { border-color: var(--rojo); transform: translateY(-3px); }
        .cat-card img { width: 40px; margin-bottom: 10px; filter: invert(1); }
        .cat-card span { display: block; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; }

        /* CATALOGO */
        .titulo-seccion { 
            color: var(--rojo); 
            border-left: 5px solid var(--rojo); 
            padding-left: 10px; 
            margin: 30px 20px 15px; 
            text-transform: uppercase;
            font-size: 1.2rem;
        }
        .catalogo {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 15px;
        }
        .card { background: var(--gris); border-radius: 12px; padding: 12px; text-align: center; border: 1px solid #222; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 8px; object-fit: cover; margin-bottom: 10px; }
        .precio { font-size: 1.2rem; color: var(--rojo); font-weight: bold; margin: 8px 0; }

        /* RESPONSIVO */
        @media (min-width: 768px) {
            .logo img { height: 110px; }
            .grid-categorias { grid-template-columns: repeat(7, 1fr); }
            .catalogo { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }
        }

        @media (max-width: 600px) {
            header { flex-direction: column; align-items: center; text-align: center; }
            .search-container { order: 3; width: 100%; }
            .logo { order: 1; }
            .acceso-mayorista { order: 2; align-items: center; }
            .logo img { height: 80px; }
            .grid-categorias { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="logo.png" alt="Indian Power Bike">
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Buscar repuestos o accesorios..." onkeyup="buscarProducto()">
        </div>

        <div class="acceso-mayorista">
            <span class="label-mayorista">Ingreso Mayoristas</span>
            <div class="inputs-mayorista">
                <input type="password" id="pinInput" class="pin-input" placeholder="PIN">
                <button onclick="verificarPIN()">Entrar</button>
            </div>
        </div>
    </header>

    <div class="swiper hero-swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="banner1.png" alt="Promo 1"></div>
            <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1611637576109-b6f76185ec9b?q=80&w=1200" alt="Promo 2"></div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <section class="categorias-section">
        <h3 class="titulo-seccion">Categorías Rápidas</h3>
        <div class="grid-categorias">
            <div class="cat-card" onclick="filtrarCategoria('Cascos')">
                <img src="https://cdn-icons-png.flaticon.com/512/684/684829.png" alt="Cascos">
                <span>Cascos</span>
            </div>
            <div class="cat-card" onclick="filtrarCategoria('Frenos')">
                <img src="https://cdn-icons-png.flaticon.com/512/1533/1533166.png" alt="Frenos">
                <span>Frenos</span>
            </div>
            <div class="cat-card" onclick="filtrarCategoria('Kit Arrastre')">
                <img src="https://cdn-icons-png.flaticon.com/512/3063/3063451.png" alt="Kit Arrastre">
                <span>Kit Arrastre</span>
            </div>
            <div class="cat-card" onclick="filtrarCategoria('Llantas')">
                <img src="https://cdn-icons-png.flaticon.com/512/3714/3714324.png" alt="Llantas">
                <span>Llantas</span>
            </div>
            <div class="cat-card" onclick="filtrarCategoria('Motor')">
                <img src="https://cdn-icons-png.flaticon.com/512/3063/3063383.png" alt="Motor">
                <span>Motor</span>
            </div>
            <div class="cat-card" onclick="filtrarCategoria('Accesorios')">
                <img src="https://cdn-icons-png.flaticon.com/512/2083/2083161.png" alt="Accesorios">
                <span>Accesorios</span>
            </div>
                 <div class="cat-card" onclick="filtrarCategoria('Luces')">
                <img src="https://img.freepik.com/vector-gratis/vista-frontal-moto-fondo-ladrillo-estilo-neon-club-motociclistas-garaje_1262-13447.jpg?semt=ais_hybrid&w=740&q=80" alt="luces">
                <span>Luces</span>
            </div>
            <div class="cat-card" onclick="cargarProductos()">
                <img src="https://cdn-icons-png.flaticon.com/512/5110/5110785.png" alt="Todos">
                <span>Ver Todo</span>
            </div>
        </div>
    </section>

    <h3 class="titulo-seccion">Catálogo de Productos</h3>
    <div class="catalogo" id="lista-productos"></div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://TU_PROYECTO.supabase.co';
        const SUPABASE_KEY = 'TU_LLAVE_ANON_KEY';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let esMayorista = false;
        let productosCache = [];

        const swiper = new Swiper('.hero-swiper', {
            loop: true,
            autoplay: { delay: 4000 },
            pagination: { el: '.swiper-pagination', clickable: true },
        });

        async function cargarProductos() {
            const { data } = await _supabase.from('productos').select('*');
            productosCache = data || [];
            renderizarHtml(productosCache);
        }

        async function filtrarCategoria(cat) {
            const { data } = await _supabase.from('productos').select('*').eq('categoria', cat);
            renderizarHtml(data || []);
        }

        function buscarProducto() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtrados = productosCache.filter(p => 
                p.nombre.toLowerCase().includes(query) || 
                p.categoria.toLowerCase().includes(query)
            );
            renderizarHtml(filtrados);
        }

        function renderizarHtml(data) {
            const contenedor = document.getElementById('lista-productos');
            contenedor.innerHTML = '';
            data.forEach(prod => {
                const precio = esMayorista ? prod.precio_mayorista : prod.precio_letal;
                contenedor.innerHTML += `
                    <div class="card">
                        <img src="${prod.imagen_url}" alt="${prod.nombre}">
                        <h4>${prod.nombre}</h4>
                        <p class="precio">$${precio.toLocaleString()} ${esMayorista ? '<br><span style="font-size:0.6rem; background:#4ade80; color:black; padding:2px 5px; border-radius:3px;">PRECIO MAYORISTA</span>' : ''}</p>
                        <button style="width:100%;" onclick="agregarAlCarrito('${prod.nombre}', ${precio})">WhatsApp</button>
                    </div>
                `;
            });
        }

        async function verificarPIN() {
            const pin = document.getElementById('pinInput').value;
            const { data } = await _supabase.from('acceso_mayoristas').select('*').eq('pin', pin);
            if (data && data.length > 0) {
                esMayorista = true;
                alert("Acceso Mayorista Activado para: " + data[0].nombre_cliente);
                renderizarHtml(productosCache);
            } else { alert("PIN Inválido"); }
        }

        function agregarAlCarrito(nombre, precio) {
            const tel = "573000000000"; 
            const msg = `Hola Indian! Me interesa: ${nombre} ($${precio.toLocaleString()})`;
            window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`);
        }

        cargarProductos();
    </script>
</body>
</html>
