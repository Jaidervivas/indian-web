<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Power Bike | Repuestos</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        :root {
            --rojo: #E31D2B;
            --negro: #0a0a0a;
            --gris: #1a1a1a;
            --blanco: #ffffff;
        }

        body {
            background-color: var(--negro);
            color: var(--blanco);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-bottom: 50px;
            overflow-x: hidden;
        }

        /* HEADER REESTRUCTURADO */
        header {
            background: black;
            padding: 15px 20px;
            display: flex;
            flex-direction: column; 
            align-items: center;
            border-bottom: 3px solid var(--rojo);
            position: sticky;
            top: 0;
            z-index: 1000;
            gap: 15px;
        }

        /* Logo Centralizado y más grande */
        .logo-central {
            display: flex;
            justify-content: center;
            width: 100%;
        }
        .logo-central img { 
            height: 90px; /* Tamaño aumentado para destacar */
            transition: 0.3s;
        }

        /* Fila de utilidades (Buscador y PIN) */
        .header-utils {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            max-width: 1200px;
            gap: 20px;
        }

        /* Buscador */
        .search-container {
            flex: 1;
            max-width: 400px;
        }
        .search-container input {
            width: 100%;
            padding: 10px 18px;
            border-radius: 25px;
            border: 1px solid #333;
            background: #111;
            color: white;
            outline: none;
            font-size: 1rem;
        }
        .search-container input:focus { border-color: var(--rojo); }

        /* Sección Mayoristas */
        .acceso-mayorista { 
            display: flex; 
            flex-direction: column; 
            align-items: flex-end; 
            gap: 5px; 
        }
        .label-mayorista {
            font-size: 0.75rem;
            color: var(--rojo);
            font-weight: bold;
            text-transform: uppercase;
        }
        .inputs-mayorista { display: flex; gap: 5px; }
        .pin-input { padding: 8px; border-radius: 5px; border: none; width: 80px; }

        button {
            background: var(--rojo);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* BANNER */
        .hero-swiper { width: 100%; height: auto; aspect-ratio: 16 / 6; margin-bottom: 20px; }
        .hero-swiper img { width: 100%; height: 100%; object-fit: cover; }

        /* CATALOGO */
        .categorias-section { padding: 15px; }
        .titulo-seccion { 
            color: var(--rojo); 
            border-left: 5px solid var(--rojo); 
            padding-left: 10px; 
            margin: 20px; 
            text-transform: uppercase;
        }
        .catalogo {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 12px;
        }
        .card { background: var(--gris); border-radius: 10px; padding: 10px; text-align: center; border: 1px solid #222; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 8px; object-fit: cover; }
        .precio { font-size: 1.1rem; color: var(--rojo); font-weight: bold; margin: 5px 0; }
        .tag-mayorista { background: #4ade80; color: black; font-size: 0.6rem; padding: 2px 5px; border-radius: 3px; }

        /* RESPONSIVO */
        @media (min-width: 768px) {
            .logo-central img { height: 120px; }
            .catalogo { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        }

        @media (max-width: 480px) {
            .logo-central img { height: 70px; }
            .header-utils { flex-direction: column; align-items: center; text-align: center; }
            .acceso-mayorista { align-items: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-central">
            <img src="logo.png" alt="Indian Power Bike">
        </div>

        <div class="header-utils">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="¿Qué repuesto buscas?" onkeyup="buscarProducto()">
            </div>

            <div class="acceso-mayorista">
                <span class="label-mayorista">Ingreso Mayoristas</span>
                <div class="inputs-mayorista">
                    <input type="password" id="pinInput" class="pin-input" placeholder="PIN">
                    <button onclick="verificarPIN()">Entrar</button>
                </div>
            </div>
        </div>
    </header>

    <div class="swiper hero-swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="banner1.png" alt="Promo 1"></div>
            <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1611637576109-b6f76185ec9b?q=80&w=1200" alt="Promo 2"></div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <h3 class="titulo-seccion">Catálogo de Repuestos</h3>
    <div class="catalogo" id="lista-productos"></div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // Configura tus credenciales aquí
        const SUPABASE_URL = 'https://TU_PROYECTO.supabase.co';
        const SUPABASE_KEY = 'TU_LLAVE_ANON_KEY';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let esMayorista = false;
        let productosCache = [];

        const swiper = new Swiper('.hero-swiper', {
            loop: true,
            autoplay: { delay: 4000 },
            pagination: { el: '.swiper-pagination', clickable: true },
        });

        async function cargarProductos() {
            const { data } = await _supabase.from('productos').select('*');
            productosCache = data || [];
            renderizarHtml(productosCache);
        }

        function buscarProducto() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtrados = productosCache.filter(p => 
                p.nombre.toLowerCase().includes(query) || 
                p.categoria.toLowerCase().includes(query)
            );
            renderizarHtml(filtrados);
        }

        function renderizarHtml(data) {
            const contenedor = document.getElementById('lista-productos');
            contenedor.innerHTML = '';
            data.forEach(prod => {
                const precio = esMayorista ? prod.precio_mayorista : prod.precio_letal;
                contenedor.innerHTML += `
                    <div class="card">
                        <img src="${prod.imagen_url}" alt="${prod.nombre}">
                        <h4>${prod.nombre}</h4>
                        <p class="precio">$${precio.toLocaleString()} ${esMayorista ? '<br><span class="tag-mayorista">PRECIO MAYORISTA</span>' : ''}</p>
                        <button style="width:100%;" onclick="agregarAlCarrito('${prod.nombre}', ${precio})">WhatsApp</button>
                    </div>
                `;
            });
        }

        async function verificarPIN() {
            const pin = document.getElementById('pinInput').value;
            const { data } = await _supabase.from('acceso_mayoristas').select('*').eq('pin', pin);
            if (data && data.length > 0) {
                esMayorista = true;
                alert("Acceso Mayorista Activado");
                renderizarHtml(productosCache);
            } else { alert("PIN Incorrecto"); }
        }

        function agregarAlCarrito(nombre, precio) {
            const tel = "573000000000"; 
            const msg = `Hola Indian! Me interesa: ${nombre} ($${precio.toLocaleString()})`;
            window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`);
        }

        cargarProductos();
    </script>
</body>
</html>
