<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Power Bike | Repuestos</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        :root {
            --rojo: #E31D2B;
            --negro: #0a0a0a;
            --gris: #1a1a1a;
            --blanco: #ffffff;
        }

        body {
            background-color: var(--negro);
            color: var(--blanco);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-bottom: 50px;
            overflow-x: hidden;
        }

        /* HEADER RESPONSIVO AJUSTADO */
        header {
            background: black;
            padding: 15px 20px;
            display: flex;
            flex-wrap: wrap; /* Permite que el buscador baje en móviles */
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--rojo);
            position: sticky;
            top: 0;
            z-index: 1000;
            gap: 15px;
        }

        /* Logo más grande y encuadrado */
        .logo img { 
            height: 65px; 
            transition: 0.3s;
        }

        /* Buscador estilizado */
        .search-container {
            flex-grow: 1;
            max-width: 400px;
            margin: 0 10px;
        }
        .search-container input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid #333;
            background: #111;
            color: white;
            outline: none;
        }
        .search-container input:focus {
            border-color: var(--rojo);
        }

        .acceso-mayorista { display: flex; gap: 5px; }
        .pin-input { padding: 8px; border-radius: 5px; border: none; outline: none; width: 80px; font-size: 0.9rem; }
        
        button {
            background: var(--rojo);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* BANNER DINÁMICO */
        .hero-swiper { 
            width: 100%; 
            height: auto; 
            aspect-ratio: 16 / 6; 
            margin-bottom: 20px; 
        }
        .hero-swiper img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            object-position: center;
        }

        /* CATEGORIAS */
        .categorias-section { padding: 15px; }
        .titulo-seccion { 
            color: var(--rojo); 
            border-left: 5px solid var(--rojo); 
            padding-left: 10px; 
            margin-bottom: 15px; 
            text-transform: uppercase;
            font-size: 1.1rem;
        }
        .grid-categorias {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
        }
        .cat-card {
            background: var(--gris);
            border-radius: 10px;
            padding: 12px 5px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #333;
            transition: 0.3s;
        }
        .cat-card img { width: 35px; margin-bottom: 8px; filter: invert(1); }
        .cat-card span { display: block; font-weight: bold; font-size: 0.75rem; }

        /* CATALOGO RESPONSIVO */
        .catalogo {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px;
            padding: 12px;
        }
        .card {
            background: var(--gris);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            border: 1px solid #222;
        }
        .card img { 
            width: 100%; 
            aspect-ratio: 1/1; 
            border-radius: 8px; 
            object-fit: cover; 
            margin-bottom: 8px;
        }
        .card h4 { font-size: 0.9rem; margin: 5px 0; min-height: 35px; }
        .precio { font-size: 1.1rem; color: var(--rojo); font-weight: bold; margin: 5px 0; }
        .tag-mayorista {
            background: #4ade80; color: black; font-size: 0.55rem;
            padding: 2px 5px; border-radius: 3px; display: inline-block;
        }

        /* AJUSTES PARA PC */
        @media (min-width: 768px) {
            .logo img { height: 80px; }
            .hero-swiper { aspect-ratio: 21 / 7; } 
            .grid-categorias { grid-template-columns: repeat(5, 1fr); }
            .catalogo { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 20px; }
            .card h4 { font-size: 1.1rem; }
            .precio { font-size: 1.4rem; }
        }

        @media (max-width: 480px) {
            header { padding: 10px; }
            .logo img { height: 50px; }
            .search-container { order: 3; max-width: 100%; margin: 5px 0; }
            .hero-swiper { aspect-ratio: 4 / 3; height: 250px; } 
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><img src="logo.png" alt="Indian Power Bike"></div>
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Buscar repuesto..." onkeyup="buscarProducto()">
        </div>

        <div class="acceso-mayorista">
            <input type="password" id="pinInput" class="pin-input" placeholder="PIN">
            <button onclick="verificarPIN()">Entrar</button>
        </div>
    </header>

    <div class="swiper hero-swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="banner1.png" alt="Promo 1"></div>
            <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1611637576109-b6f76185ec9b?q=80&w=1200" alt="Promo 2"></div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <section class="categorias-section">
        <h3 class="titulo-seccion">Ofertas sólo para ti</h3>
        <div class="grid-categorias">
            <div class="cat-card" onclick="filtrarCategoria('Baterias')">
                <img src="https://cdn-icons-png.flaticon.com/512/2083/2083161.png" alt="Baterías">
                <span>BATERÍAS</span>
            </div>
            <div class="cat-card" onclick="filtrarCategoria('Frenos')">
                <img src="https://cdn-icons-png.flaticon.com/512/1533/1533166.png" alt="Frenos">
                <span>FRENOS</span>
            </div>
            <div class="cat-card" onclick="filtrarCategoria('Cilindros')">
                <img src="https://cdn-icons-png.flaticon.com/512/3063/3063383.png" alt="Cilindros">
                <span>CILINDROS</span>
            </div>
            <div class="cat-card" onclick="filtrarCategoria('Llantas')">
                <img src="https://cdn-icons-png.flaticon.com/512/3714/3714324.png" alt="Llantas">
                <span>LLANTAS</span>
            </div>
            <div class="cat-card" onclick="cargarProductos()">
                <img src="https://cdn-icons-png.flaticon.com/512/5110/5110785.png" alt="Todos">
                <span>TODO</span>
            </div>
        </div>
    </section>

    <h3 class="titulo-seccion" style="margin-left: 20px;">Catálogo</h3>
    <div class="catalogo" id="lista-productos"></div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://TU_PROYECTO.supabase.co';
        const SUPABASE_KEY = 'TU_LLAVE_ANON_KEY';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let esMayorista = false;
        let productosCache = []; // Para que el buscador sea instantáneo

        const swiper = new Swiper('.hero-swiper', {
            loop: true,
            autoplay: { delay: 4000 },
            pagination: { el: '.swiper-pagination', clickable: true },
        });

        async function renderizarHtml(data) {
            const contenedor = document.getElementById('lista-productos');
            contenedor.innerHTML = '';
            data.forEach(prod => {
                const precio = esMayorista ? prod.precio_mayorista : prod.precio_letal;
                contenedor.innerHTML += `
                    <div class="card">
                        <img src="${prod.imagen_url}" alt="${prod.nombre}">
                        <h4>${prod.nombre}</h4>
                        <p class="precio">$${precio.toLocaleString()} ${esMayorista ? '<br><span class="tag-mayorista">MAYORISTA</span>' : ''}</p>
                        <button style="width:100%; font-size:0.8rem;" onclick="agregarAlCarrito('${prod.nombre}', ${precio})">WhatsApp</button>
                    </div>
                `;
            });
        }

        async function cargarProductos() {
            const { data } = await _supabase.from('productos').select('*');
            productosCache = data || [];
            renderizarHtml(productosCache);
        }

        // FUNCIÓN DEL BUSCADOR
        function buscarProducto() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtrados = productosCache.filter(p => 
                p.nombre.toLowerCase().includes(query) || 
                p.categoria.toLowerCase().includes(query)
            );
            renderizarHtml(filtrados);
        }

        async function filtrarCategoria(cat) {
            const { data } = await _supabase.from('productos').select('*').eq('categoria', cat);
            renderizarHtml(data);
        }

        async function verificarPIN() {
            const pin = document.getElementById('pinInput').value;
            const { data } = await _supabase.from('acceso_mayoristas').select('*').eq('pin', pin);
            if (data && data.length > 0) {
                esMayorista = true;
                alert("Acceso Mayorista: " + data[0].nombre_cliente);
                cargarProductos();
            } else { alert("PIN Inválido"); }
        }

        function agregarAlCarrito(nombre, precio) {
            const tel = "573000000000"; 
            const msg = `Hola Indian! Me interesa: ${nombre} ($${precio.toLocaleString()})`;
            window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`);
        }

        cargarProductos();
    </script>
</body>
</html>
