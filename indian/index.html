<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Power Bike | Repuestos</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --rojo: #E31D2B;
            --negro: #0a0a0a;
            --gris: #1a1a1a;
            --blanco: #ffffff;
        }

        body {
            background-color: var(--negro);
            color: var(--blanco);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-bottom: 50px;
            overflow-x: hidden;
        }

        header {
            background: black;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--rojo);
            position: relative;
            gap: 20px;
            flex-wrap: wrap;
        }

        .logo img { height: 90px; transition: 0.3s; display: block; }

        .search-container { flex: 1; max-width: 500px; display: flex; justify-content: center; }
        .search-container input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid #333;
            background: #111;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        .acceso-mayorista { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .label-mayorista { font-size: 0.75rem; color: var(--rojo); font-weight: bold; text-transform: uppercase; }
        .inputs-mayorista { display: flex; gap: 8px; }
        .pin-input { padding: 10px; border-radius: 5px; border: none; width: 90px; background: #fff; }

        button { background: var(--rojo); color: white; border: none; padding: 10px 18px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* --- BANNER AUTO-AJUSTABLE --- */
        .hero-swiper { width: 100%; height: auto; margin-bottom: 20px; overflow: hidden; background: #000; }
        .hero-swiper .swiper-slide img { width: 100%; height: auto; display: block; object-fit: contain; }
        .swiper-pagination-bullet { background: #fff; opacity: 0.5; }
        .swiper-pagination-bullet-active { background: var(--rojo); opacity: 1; }

        /* --- BOTÓN FLOTANTE CARRITO --- */
        .cart-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: var(--rojo);
            color: white;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            cursor: pointer;
            z-index: 3000;
            box-shadow: 0 5px 20px rgba(227, 29, 43, 0.5);
            transition: 0.3s;
        }
        .cart-btn:hover { transform: scale(1.1); }
        .cart-count {
            position: absolute;
            top: 0;
            right: 0;
            background: white;
            color: var(--rojo);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 13px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid var(--rojo);
        }

        /* --- MODAL CARRITO (PANEL LATERAL) --- */
        .modal-cart {
            display: none;
            position: fixed;
            top: 0; right: 0;
            width: 100%; max-width: 450px;
            height: 100%;
            background: var(--gris);
            z-index: 4000;
            box-shadow: -10px 0 30px rgba(0,0,0,0.8);
            flex-direction: column;
        }
        .cart-header { padding: 25px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        #cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: #222;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .cart-footer { padding: 25px; border-top: 1px solid #333; background: #111; }
        .btn-finish { 
            width: 100%; 
            padding: 18px; 
            background: #25D366; 
            color: white; 
            border-radius: 10px; 
            font-weight: bold; 
            border: none; 
            cursor: pointer; 
            font-size: 1.1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        /* PRODUCTOS */
        .categorias-section { padding: 15px; max-width: 1200px; margin: 0 auto; }
        .grid-categorias { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .cat-card { background: var(--gris); border-radius: 12px; padding: 18px 5px; text-align: center; cursor: pointer; border: 1px solid #333; transition: 0.3s; }
        .cat-card:hover { border-color: var(--rojo); }
        .cat-card span { display: block; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; }

        .catalogo { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        .card { background: var(--gris); border-radius: 12px; padding: 15px; border: 1px solid #222; display: flex; flex-direction: column; gap: 8px; }
        .card .codigo-ref { font-size: 0.7rem; color: var(--rojo); font-weight: bold; }
        .img-zoom-cont { position: relative; cursor: zoom-in; overflow: hidden; border-radius: 8px; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .precio { font-size: 1.2rem; color: var(--blanco); font-weight: bold; }
        .compra-footer { display: flex; gap: 10px; align-items: center; margin-top: auto; }
        .cant-input { width: 50px; padding: 8px; background: #333; color: white; border: none; border-radius: 5px; text-align: center; }

        /* MODAL LUPA */
        .modal-lupa { display: none; position: fixed; z-index: 5000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-lupa img { max-width: 90%; max-height: 90%; border: 2px solid var(--rojo); border-radius: 10px; }
        .close-lupa { position: absolute; top: 20px; right: 30px; font-size: 40px; color: white; cursor: pointer; }

        @media (min-width: 768px) {
            .logo img { height: 110px; }
            .grid-categorias { grid-template-columns: repeat(8, 1fr); }
            .catalogo { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><img src="logo.png" alt="Indian Power Bike"></div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Buscar por nombre o referencia..." onkeyup="buscarProducto()">
        </div>
        <div class="acceso-mayorista">
            <span class="label-mayorista">Ingreso Mayoristas</span>
            <div class="inputs-mayorista">
                <input type="password" id="pinInput" class="pin-input" placeholder="PIN">
                <button onclick="verificarPIN()">Entrar</button>
            </div>
        </div>
    </header>

    <div class="cart-btn" onclick="toggleCart()">
        <i class="fa-solid fa-cart-shopping"></i>
        <div class="cart-count" id="cart-count">0</div>
    </div>

    <div class="modal-cart" id="modal-cart">
        <div class="cart-header">
            <h3>🛒 Tu Pedido</h3>
            <i class="fa-solid fa-xmark" onclick="toggleCart()" style="cursor:pointer; font-size: 28px;"></i>
        </div>
        <div id="cart-items">
            </div>
        <div class="cart-footer">
            <div style="display:flex; justify-content:space-between; margin-bottom: 20px; font-size: 1.2rem;">
                <span>Total a pagar:</span>
                <span id="cart-total" style="font-weight:bold; color:var(--rojo);">$0</span>
            </div>
            <button class="btn-finish" onclick="enviarPedido()">
                <i class="fa-brands fa-whatsapp"></i> FINALIZAR COMPRA
            </button>
        </div>
    </div>

    <div class="swiper hero-swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="banner1.png" alt="Promo 1"></div>
            <div class="swiper-slide"><img src="banner2.png" alt="Promo 2"></div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <section class="categorias-section">
        <div class="grid-categorias">
            <div class="cat-card" onclick="filtrarCategoria('Cascos')"><span>Cascos</span></div>
            <div class="cat-card" onclick="filtrarCategoria('Frenos')"><span>Frenos</span></div>
            <div class="cat-card" onclick="filtrarCategoria('Kit Arrastre')"><span>Kit Arrastre</span></div>
            <div class="cat-card" onclick="filtrarCategoria('Llantas')"><span>Llantas</span></div>
            <div class="cat-card" onclick="filtrarCategoria('Motor')"><span>Motor</span></div>
            <div class="cat-card" onclick="filtrarCategoria('Accesorios')"><span>Accesorios</span></div>
            <div class="cat-card" onclick="filtrarCategoria('Luces')"><span>Luces</span></div>
            <div class="cat-card" onclick="renderizarHtml(productosCache)"><span>Ver Todo</span></div>
        </div>
    </section>

    <div class="catalogo" id="lista-productos"></div>

    <div id="modalLupa" class="modal-lupa" onclick="this.style.display='none'">
        <span class="close-lupa">&times;</span>
        <img id="imgExpandida">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const productosManuales = [
            { id: 1, nombre: "Casco MT Revenge 2", codigo: "CAS-001", descripcion: "Certificación ECE de alta seguridad.", categoria: "Cascos", precio_letal: 350000, precio_mayorista: 290000, imagen_url: "https://motozonaljarafe.com/wp-content/uploads/2021/07/1279750213-1.png" },
            { id: 2, nombre: "Pastillas de Freno Brembo", codigo: "FRE-005", descripcion: "Máxima potencia de frenado.", categoria: "Frenos", precio_letal: 85000, precio_mayorista: 65000, imagen_url: "https://mundimotos.com/cdn/shop/files/C43082-I853-C601.png?v=1754743972&width=600" }
        ];

        let esMayorista = false;
        let productosCache = productosManuales;
        let carrito = [];

        const swiper = new Swiper('.hero-swiper', {
            loop: true,
            autoHeight: true,
            autoplay: { delay: 4000 },
            pagination: { el: '.swiper-pagination', clickable: true },
            observer: true,
            observeParents: true,
        });

        function renderizarHtml(data) {
            const contenedor = document.getElementById('lista-productos');
            contenedor.innerHTML = '';
            data.forEach(prod => {
                const precio = esMayorista ? prod.precio_mayorista : prod.precio_letal;
                contenedor.innerHTML += `
                    <div class="card">
                        <span class="codigo-ref">REF: ${prod.codigo}</span>
                        <div class="img-zoom-cont" onclick="abrirLupa('${prod.imagen_url}')">
                            <img src="${prod.imagen_url}">
                        </div>
                        <h4>${prod.nombre}</h4>
                        <p class="descripcion">${prod.descripcion}</p>
                        <p class="precio">$${precio.toLocaleString()}</p>
                        <div class="compra-footer">
                            <input type="number" value="1" min="1" class="cant-input" id="cant-${prod.id}">
                            <button style="flex:1;" onclick="agregarAlCarrito(${prod.id})">🛒 Agregar</button>
                        </div>
                    </div>
                `;
            });
        }

        // Lógica de Carrito
        function agregarAlCarrito(id) {
            const prod = productosCache.find(p => p.id === id);
            const cant = parseInt(document.getElementById('cant-' + id).value);
            const precio = esMayorista ? prod.precio_mayorista : prod.precio_letal;
            
            const itemExistente = carrito.find(item => item.id === id);
            if(itemExistente) {
                itemExistente.cantidad += cant;
            } else {
                carrito.push({ ...prod, precio, cantidad: cant });
            }
            
            actualizarCarritoUI();
            
            // Efecto visual: Abrir carrito al agregar (opcional, puedes quitarlo)
            toggleCart(true); 
        }

        function actualizarCarritoUI() {
            const contenedor = document.getElementById('cart-items');
            const totalText = document.getElementById('cart-total');
            const countBadge = document.getElementById('cart-count');
            
            contenedor.innerHTML = '';
            let total = 0;
            let totalItems = 0;

            carrito.forEach((item, index) => {
                const subtotal = item.precio * item.cantidad;
                total += subtotal;
                totalItems += item.cantidad;
                
                contenedor.innerHTML += `
                    <div class="cart-item">
                        <div style="flex:1;">
                            <div style="font-weight:bold; font-size:0.9rem;">${item.nombre}</div>
                            <div style="color:var(--rojo); font-size:0.85rem;">${item.cantidad} x $${item.precio.toLocaleString()}</div>
                        </div>
                        <div style="font-weight:bold; margin: 0 10px;">$${subtotal.toLocaleString()}</div>
                        <i class="fa-solid fa-trash" onclick="eliminarDelCarrito(${index})" style="color:#666; cursor:pointer;"></i>
                    </div>
                `;
            });

            totalText.innerText = `$${total.toLocaleString()}`;
            countBadge.innerText = totalItems;
        }

        function eliminarDelCarrito(index) {
            carrito.splice(index, 1);
            actualizarCarritoUI();
        }

        function toggleCart(forzarAbrir = false) {
            const modal = document.getElementById('modal-cart');
            if(forzarAbrir) {
                modal.style.display = 'flex';
            } else {
                modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
            }
        }

        function enviarPedido() {
            if(carrito.length === 0) return alert("El carrito está vacío");

            let mensaje = "¡Hola Indian Power Bike! 👋\nQuiero realizar el siguiente pedido:\n\n";
            let totalPedido = 0;

            carrito.forEach(item => {
                const subtotal = item.precio * item.cantidad;
                mensaje += `✅ *${item.nombre}*\n   Cant: ${item.cantidad} x $${item.precio.toLocaleString()}\n   Subtotal: $${subtotal.toLocaleString()}\n\n`;
                totalPedido += subtotal;
            });

            mensaje += `Total General: *$${totalPedido.toLocaleString()}*`;
            if(esMayorista) mensaje += `\n*(Modo Mayorista Aplicado)*`;

            const urlWhasapp = `https://wa.me/573003501106?text=${encodeURIComponent(mensaje)}`;
            window.open(urlWhasapp);
        }

        // Funciones originales mantenidas
        function abrirLupa(url) {
            document.getElementById('imgExpandida').src = url;
            document.getElementById('modalLupa').style.display = 'flex';
        }

        function filtrarCategoria(cat) {
            const filtrados = productosCache.filter(p => p.categoria === cat);
            renderizarHtml(filtrados);
        }

        function buscarProducto() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtrados = productosCache.filter(p => p.nombre.toLowerCase().includes(query) || p.codigo.toLowerCase().includes(query));
            renderizarHtml(filtrados);
        }

        function verificarPIN() {
            if (document.getElementById('pinInput').value === "1234") {
                esMayorista = true;
                alert("Modo Mayorista Activado");
                renderizarHtml(productosCache);
            } else { alert("PIN Incorrecto"); }
        }

        renderizarHtml(productosCache);
    </script>
</body>
</html>
